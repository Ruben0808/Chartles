name: Nightly scan

on:
  # 11:00 UTC = 4:30 PM IST, ~30 min after NSE close.
  schedule:
    - cron: "0 11 * * 1-5"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: scanner/requirements.txt

      - name: Install scanner deps
        working-directory: scanner
        run: pip install -r requirements.txt

      - name: Run scanner
        working-directory: scanner
        run: python run.py

      - name: Commit updated data
        run: |
          git config user.name "chartles-bot"
          git config user.email "chartles-bot@users.noreply.github.com"
          git add data/stocks.json
          if git diff --staged --quiet; then
            echo "No data changes."
          else
            git commit -m "scan: update stocks.json ($(date -u +%Y-%m-%d))"
            git push
          fi
